<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="Bienvenido a sncramiro.com: notas sobre ServiceNow e IA">
  <defs>
    <linearGradient id="wBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2226"/>
      <stop offset="1" stop-color="#08181b"/>
    </linearGradient>
    <linearGradient id="wGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ef06a"/>
      <stop offset="1" stop-color="#3fae2f"/>
    </linearGradient>
    <filter id="wSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#wBg)"/>
  <circle cx="600" cy="270" r="250" fill="#62d84e" opacity="0.09" filter="url(#wSoft)"/>

  <!-- avatar -->
  <g transform="translate(600 250)">
    <circle r="92" fill="#0f2f38" stroke="url(#wGreen)" stroke-width="4"/>
    <text y="24" text-anchor="middle" fill="#7ef06a" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="-2">RA</text>
  </g>

  <!-- greeting -->
  <text x="600" y="400" text-anchor="middle" fill="#e8f2ee" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800" letter-spacing="-1">¡Hola! Soy Ramiro</text>
  <text x="600" y="436" text-anchor="middle" fill="#7f9c97" font-family="Inter, Arial, sans-serif" font-size="21">notas sobre ServiceNow, IA y desarrollo</text>

  <!-- floating topic pills -->
  <g font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600">
    <g transform="translate(200 150)">
      <rect x="-10" y="-26" width="176" height="44" rx="22" fill="#12363b" stroke="#2f7a4a" stroke-width="2"/>
      <text x="16" y="4" fill="#9ccdb6">ServiceNow</text>
    </g>
    <g transform="translate(840 130) rotate(4)">
      <rect x="-10" y="-26" width="90" height="44" rx="22" fill="#173f36" stroke="#3f8a54" stroke-width="2"/>
      <text x="16" y="4" fill="#b6f0a6">IA</text>
    </g>
    <g transform="translate(150 470) rotate(-3)">
      <rect x="-10" y="-26" width="120" height="44" rx="22" fill="#12363b" stroke="#2b5b57" stroke-width="2"/>
      <text x="14" y="4" fill="#9ccdb6">Notas</text>
    </g>
    <g transform="translate(900 470) rotate(3)">
      <rect x="-10" y="-26" width="110" height="44" rx="22" fill="#12363b" stroke="#2b5b57" stroke-width="2"/>
      <text x="14" y="4" fill="#9ccdb6">ES · EN</text>
    </g>
  </g>
</svg>
