<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="Nuevo sitio estático, rápido y seguro">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2226"/>
      <stop offset="1" stop-color="#08181b"/>
    </linearGradient>
    <linearGradient id="green3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ef06a"/>
      <stop offset="1" stop-color="#3fae2f"/>
    </linearGradient>
    <filter id="soft3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg3)"/>
  <circle cx="950" cy="150" r="210" fill="#62d84e" opacity="0.10" filter="url(#soft3)"/>
  <circle cx="240" cy="470" r="180" fill="#1f7a3e" opacity="0.12" filter="url(#soft3)"/>

  <!-- speed lines -->
  <g stroke="#2f6a5f" stroke-width="6" stroke-linecap="round" opacity="0.8">
    <path d="M120 250 h150"/>
    <path d="M90 300 h210"/>
    <path d="M140 350 h120"/>
  </g>

  <!-- lightning bolt (fast/static) -->
  <path d="M470 120 L360 330 H470 L430 480 L720 250 H560 L640 120 Z"
        fill="url(#green3)"/>

  <!-- code tag -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="120" font-weight="700" fill="#173f36">
    <text x="770" y="380">&lt;/&gt;</text>
  </g>
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="120" font-weight="700" fill="none" stroke="#3f8a54" stroke-width="2">
    <text x="770" y="380">&lt;/&gt;</text>
  </g>
</svg>
