<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="Now Assist y AI Agents en ServiceNow">
  <defs>
    <linearGradient id="naBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2226"/>
      <stop offset="1" stop-color="#08181b"/>
    </linearGradient>
    <linearGradient id="naGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ef06a"/>
      <stop offset="1" stop-color="#3fae2f"/>
    </linearGradient>
    <filter id="naSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#naBg)"/>
  <circle cx="600" cy="300" r="230" fill="#62d84e" opacity="0.08" filter="url(#naSoft)"/>

  <!-- agent network -->
  <g stroke="#2b6a55" stroke-width="2" opacity="0.9">
    <line x1="600" y1="300" x2="380" y2="170"/>
    <line x1="600" y1="300" x2="820" y2="170"/>
    <line x1="600" y1="300" x2="360" y2="430"/>
    <line x1="600" y1="300" x2="840" y2="420"/>
    <line x1="600" y1="300" x2="600" y2="120"/>
    <line x1="600" y1="300" x2="600" y2="480"/>
  </g>

  <!-- outer nodes -->
  <g>
    <g transform="translate(380 170)"><circle r="30" fill="#12363b" stroke="#2f7a4a" stroke-width="2"/><text y="6" text-anchor="middle" font-family="Inter, Arial" font-size="15" fill="#9ccdb6">HR</text></g>
    <g transform="translate(820 170)"><circle r="30" fill="#12363b" stroke="#2f7a4a" stroke-width="2"/><text y="6" text-anchor="middle" font-family="Inter, Arial" font-size="15" fill="#9ccdb6">IT</text></g>
    <g transform="translate(360 430)"><circle r="30" fill="#12363b" stroke="#2f7a4a" stroke-width="2"/><text y="6" text-anchor="middle" font-family="Inter, Arial" font-size="13" fill="#9ccdb6">CSM</text></g>
    <g transform="translate(840 420)"><circle r="30" fill="#12363b" stroke="#2f7a4a" stroke-width="2"/><text y="6" text-anchor="middle" font-family="Inter, Arial" font-size="12" fill="#9ccdb6">Sec</text></g>
    <g transform="translate(600 120)"><circle r="26" fill="#12363b" stroke="#2f7a4a" stroke-width="2"/><text y="6" text-anchor="middle" font-family="Inter, Arial" font-size="12" fill="#9ccdb6">Fin</text></g>
    <g transform="translate(600 480)"><circle r="26" fill="#12363b" stroke="#2f7a4a" stroke-width="2"/><text y="5" text-anchor="middle" font-family="Inter, Arial" font-size="11" fill="#9ccdb6">Legal</text></g>
  </g>

  <!-- central agent core -->
  <circle cx="600" cy="300" r="58" fill="url(#naGreen)"/>
  <g transform="translate(600 300)" stroke="#08281a" stroke-width="4" fill="none" stroke-linecap="round">
    <circle r="20" stroke="#08281a" stroke-width="4"/>
    <path d="M0 -34 a34 34 0 0 1 30 17" opacity="0.9"/>
    <path d="M0 34 a34 34 0 0 1 -30 -17" opacity="0.9"/>
    <circle cx="30" cy="17" r="4" fill="#08281a" stroke="none"/>
    <circle cx="-30" cy="-17" r="4" fill="#08281a" stroke="none"/>
  </g>
</svg>
