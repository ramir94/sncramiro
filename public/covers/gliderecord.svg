<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="Fragmentos de código GlideRecord">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2226"/>
      <stop offset="1" stop-color="#08181b"/>
    </linearGradient>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg2)"/>
  <circle cx="1010" cy="480" r="200" fill="#62d84e" opacity="0.10" filter="url(#soft2)"/>
  <circle cx="180" cy="110" r="160" fill="#1f7a3e" opacity="0.12" filter="url(#soft2)"/>

  <!-- database cylinder -->
  <g transform="translate(120 190)" fill="#12363b" stroke="#2b5b57" stroke-width="3">
    <ellipse cx="90" cy="30" rx="90" ry="28"/>
    <path d="M0 30 V190 a90 28 0 0 0 180 0 V30" fill="#0f2f34"/>
    <ellipse cx="90" cy="30" rx="90" ry="28" fill="#12363b"/>
    <path d="M0 90 a90 28 0 0 0 180 0" fill="none"/>
    <path d="M0 150 a90 28 0 0 0 180 0" fill="none"/>
  </g>

  <!-- code editor window -->
  <g transform="translate(430 150)">
    <rect x="0" y="0" width="650" height="300" rx="18" fill="#0a1e22" stroke="#234b4f" stroke-width="2"/>
    <rect x="0" y="0" width="650" height="46" rx="18" fill="#10292e"/>
    <rect x="0" y="30" width="650" height="16" fill="#10292e"/>
    <circle cx="28" cy="23" r="7" fill="#e0655f"/>
    <circle cx="52" cy="23" r="7" fill="#e0b24f"/>
    <circle cx="76" cy="23" r="7" fill="#62d84e"/>

    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22">
      <text x="30" y="100" fill="#7ef06a">var</text>
      <text x="82" y="100" fill="#c9ded9">gr = new</text>
      <text x="230" y="100" fill="#8fd0ff">GlideRecord</text>
      <text x="392" y="100" fill="#c9ded9">('incident');</text>

      <text x="30" y="150" fill="#c9ded9">gr.</text>
      <text x="72" y="150" fill="#8fd0ff">addActiveQuery</text>
      <text x="272" y="150" fill="#c9ded9">();</text>

      <text x="30" y="200" fill="#c9ded9">gr.</text>
      <text x="72" y="200" fill="#8fd0ff">query</text>
      <text x="150" y="200" fill="#c9ded9">();</text>

      <text x="30" y="250" fill="#5f807c">while (gr.next()) {</text>
      <text x="52" y="284" fill="#5f807c">…</text>
    </g>
