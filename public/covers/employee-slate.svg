<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="De navegar por un portal a preguntar a una IA">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c2226"/>
      <stop offset="1" stop-color="#08181b"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ef06a"/>
      <stop offset="1" stop-color="#3fae2f"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="200" fill="#62d84e" opacity="0.10" filter="url(#soft)"/>
  <circle cx="220" cy="520" r="180" fill="#1f7a3e" opacity="0.12" filter="url(#soft)"/>

  <!-- Left: browse (portal grid) -->
  <g transform="translate(120 150)">
    <text x="0" y="-28" fill="#7f9c97" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="4">NAVEGAR</text>
    <g fill="#12363b" stroke="#245055" stroke-width="2">
      <rect x="0" y="0" width="120" height="88" rx="12"/>
      <rect x="140" y="0" width="120" height="88" rx="12"/>
      <rect x="280" y="0" width="120" height="88" rx="12"/>
      <rect x="0" y="108" width="120" height="88" rx="12"/>
      <rect x="140" y="108" width="120" height="88" rx="12"/>
      <rect x="280" y="108" width="120" height="88" rx="12"/>
      <rect x="0" y="216" width="120" height="88" rx="12"/>
      <rect x="140" y="216" width="120" height="88" rx="12"/>
      <rect x="280" y="216" width="120" height="88" rx="12"/>
    </g>
    <g fill="#37605f">
      <rect x="16" y="20" width="64" height="10" rx="5"/>
      <rect x="156" y="20" width="64" height="10" rx="5"/>
      <rect x="296" y="20" width="64" height="10" rx="5"/>
      <rect x="16" y="128" width="64" height="10" rx="5"/>
      <rect x="156" y="128" width="64" height="10" rx="5"/>
      <rect x="296" y="128" width="64" height="10" rx="5"/>
      <rect x="16" y="236" width="64" height="10" rx="5"/>
      <rect x="156" y="236" width="64" height="10" rx="5"/>
      <rect x="296" y="236" width="64" height="10" rx="5"/>
    </g>
  </g>

  <!-- Arrow -->
  <g transform="translate(560 300)">
    <path d="M0 0 H80" stroke="url(#green)" stroke-width="8" stroke-linecap="round"/>
    <path d="M64 -16 L88 0 L64 16" fill="none" stroke="url(#green)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Right: ask (AI chat bar) -->
  <g transform="translate(700 175)">
    <text x="0" y="-28" fill="#8fe07f" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="4">PREGUNTAR</text>

    <!-- chat bubbles -->
    <rect x="0" y="0" width="300" height="60" rx="18" fill="#12363b" stroke="#2b5b57" stroke-width="2"/>
    <rect x="24" y="24" width="180" height="12" rx="6" fill="#4a726f"/>

    <rect x="80" y="80" width="300" height="60" rx="18" fill="#173f36" stroke="#2f7a4a" stroke-width="2"/>
    <rect x="104" y="104" width="150" height="12" rx="6" fill="#7ef06a"/>
    <rect x="264" y="104" width="70" height="12" rx="6" fill="#3f8a54"/>

    <!-- input bar with send -->
    <rect x="0" y="180" width="380" height="70" rx="20" fill="#0e2c30" stroke="#2b5b57" stroke-width="2"/>
    <rect x="28" y="208" width="240" height="14" rx="7" fill="#3a5f5d"/>
    <circle cx="336" cy="215" r="26" fill="url(#green)"/>
    <path d="M326 215 h20 M338 207 l8 8 l-8 8" stroke="#08181b" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
