<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620" role="img" aria-label="Mockup de una home tipo Employee Slate: preguntar a una IA">
  <defs>
    <linearGradient id="slateGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ef06a"/>
      <stop offset="1" stop-color="#3fae2f"/>
    </linearGradient>
    <filter id="slShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1b2a33" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1000" height="620" fill="#f2f3f4"/>

  <!-- left icon rail -->
  <rect x="0" y="0" width="60" height="620" fill="#ffffff" stroke="#e4e7ea"/>
  <g fill="#5a6b76">
    <rect x="22" y="26" width="18" height="3" rx="1.5"/><rect x="22" y="33" width="18" height="3" rx="1.5"/><rect x="22" y="40" width="18" height="3" rx="1.5"/>
  </g>
  <g fill="none" stroke="#8a99a4" stroke-width="2">
    <rect x="21" y="78" width="18" height="16" rx="3"/>
    <circle cx="30" cy="128" r="9"/>
    <rect x="21" y="168" width="18" height="16" rx="3"/>
    <circle cx="30" cy="218" r="9"/>
    <rect x="21" y="258" width="18" height="16" rx="3"/>
  </g>
  <rect x="0" y="70" width="3" height="32" rx="2" fill="#3fae2f"/>

  <!-- brand -->
  <text x="80" y="34" fill="#2a3b47" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">acme<tspan fill="#3fae2f">works</tspan></text>

  <!-- greeting -->
  <text x="530" y="98" fill="#1b2a33" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" text-anchor="middle">◇ Start your day right, Andrea</text>

  <!-- ask bar -->
  <rect x="200" y="130" width="660" height="86" rx="24" fill="#ffffff" filter="url(#slShadow)"/>
  <text x="232" y="180" fill="#98a5ad" font-family="Inter, Arial, sans-serif" font-size="16">Ask anything… “What is the next company holiday?”</text>
  <circle cx="240" cy="196" r="12" fill="none" stroke="#b3bec4" stroke-width="2"/><path d="M240 190 v12 M234 196 h12" stroke="#b3bec4" stroke-width="2"/>
  <circle cx="812" cy="173" r="26" fill="url(#slateGreen)"/>
  <path d="M812 162 a7 7 0 0 1 7 7 v6 a7 7 0 0 1 -14 0 v-6 a7 7 0 0 1 7 -7 z M800 176 a12 12 0 0 0 24 0 M812 188 v8" fill="none" stroke="#0d3010" stroke-width="2.4" stroke-linecap="round"/>

  <!-- suggestion chips -->
  <g font-family="Inter, Arial, sans-serif" font-size="12.5" fill="#5a6b76">
    <rect x="330" y="240" width="140" height="30" rx="15" fill="#ffffff" stroke="#e0e4e7"/><text x="352" y="259">Schedule my 1:1</text>
    <rect x="482" y="240" width="150" height="30" rx="15" fill="#ffffff" stroke="#e0e4e7"/><text x="504" y="259">Resolve open tickets</text>
    <rect x="644" y="240" width="130" height="30" rx="15" fill="#ffffff" stroke="#e0e4e7"/><text x="666" y="259">Add a widget</text>
  </g>

  <!-- Inbox / to-dos card (dark) -->
  <rect x="80" y="310" width="300" height="270" rx="16" fill="#0f2f38"/>
  <text x="104" y="348" fill="#e8f2ee" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Inbox</text>
  <path d="M352 336 l14 -14 M358 322 h8 v8" stroke="#7fa39c" stroke-width="2" fill="none"/>
  <text x="104" y="382" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700"><tspan fill="#7ef06a">5 to-dos</tspan><tspan fill="#e8f2ee"> need</tspan></text>
  <text x="104" y="406" fill="#e8f2ee" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">attention.</text>
  <rect x="104" y="430" width="90" height="22" rx="11" fill="#e0655f"/><text x="116" y="445" fill="#fff" font-family="Inter, Arial" font-size="11" font-weight="600">Overdue 3d</text>
  <rect x="104" y="462" width="252" height="90" rx="10" fill="#133b45"/>
  <text x="120" y="492" fill="#cfe0db" font-family="Inter, Arial, sans-serif" font-size="12.5">HR approval: shift extension</text>
  <text x="120" y="512" fill="#cfe0db" font-family="Inter, Arial, sans-serif" font-size="12.5">for 140 night-sort workers</text>
  <circle cx="332" cy="500" r="16" fill="#2b5b57"/>

  <!-- Popular content card -->
  <rect x="400" y="310" width="520" height="120" rx="16" fill="#ffffff" stroke="#e6e9ec"/>
  <text x="424" y="344" fill="#1b2a33" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Popular content</text>
  <rect x="424" y="356" width="220" height="56" rx="8" fill="#f6f8f9"/>
  <text x="440" y="382" fill="#2a3b47" font-family="Inter, Arial" font-size="12.5" font-weight="600">Q2 budget guidelines</text>
  <text x="440" y="400" fill="#8a99a4" font-family="Inter, Arial" font-size="11">45.5k views</text>
  <rect x="664" y="356" width="230" height="56" rx="8" fill="#f6f8f9"/>
  <text x="680" y="382" fill="#2a3b47" font-family="Inter, Arial" font-size="12.5" font-weight="600">Travel expense policy</text>
  <text x="680" y="400" fill="#8a99a4" font-family="Inter, Arial" font-size="11">38k views</text>

  <!-- Quick links card -->
  <rect x="400" y="446" width="520" height="134" rx="16" fill="#ffffff" stroke="#e6e9ec"/>
  <text x="424" y="480" fill="#1b2a33" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Quick links</text>
  <g fill="#eaf7e6" stroke="#cdeac4">
    <rect x="424" y="494" width="106" height="66" rx="10"/>
    <rect x="546" y="494" width="106" height="66" rx="10"/>
    <rect x="668" y="494" width="106" height="66" rx="10"/>
    <rect x="790" y="494" width="106" height="66" rx="10"/>
  </g>
  <g fill="#3fae2f">
    <circle cx="477" cy="518" r="10"/><circle cx="599" cy="518" r="10"/><circle cx="721" cy="518" r="10"/><circle cx="843" cy="518" r="10"/>
  </g>
  <g fill="#5a6b76" font-family="Inter, Arial" font-size="10.5" text-anchor="middle">
    <text x="477" y="548">Catalog</text><text x="599" y="548">Payslip</text><text x="721" y="548">PTO</text><text x="843" y="548">Tools</text>
  </g>
</svg>
